<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tahreen & Faiz</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#fdf8f4;
font-family:Poppins,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
width:350px;
height:600px;
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.15);
animation:zoom 1.5s ease;
position:relative;
}

@keyframes zoom{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.hero{
height:60%;
background:url("images/couple.png") center/cover;
}

.content{
padding:25px;
text-align:center;
}

h1{
font-family:Cinzel;
font-size:30px;
color:#8b0000;
}

.date{
margin-top:10px;
font-size:18px;
color:#555;
}

.place{
margin-top:15px;
line-height:1.8;
color:#666;
}

.btn{
margin-top:25px;
display:inline-block;
padding:14px 35px;
background:#8b0000;
color:white;
border-radius:50px;
text-decoration:none;
transition:.4s;
}

.btn:hover{
background:#b22222;
transform:scale(1.05);
}

.fade{
animation:fadeUp 2s;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="card">

<div class="hero"></div>

<div class="content fade">

<h1>Tahreen <br>&<br> Faiz</h1>

<div class="date">
04 December 2026
</div>

<div class="place">
After Maghrib • 7:00 PM<br><br>

Ahmed Lawn Hall<br>
Next to Petrol Pump<br>
Mumbra
</div>

<a class="btn" href="#next">
Open Invitation
</a>

</div>

</div>

</body>
</html>
